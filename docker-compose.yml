services:
  # ─── Core Infrastructure ────────────────────────────────────────────
  stdb:
    image: clockworklabs/spacetimedb:latest
    ports:
      - "3000:3000"
    volumes:
      - stdb-data:/var/lib/spacetimedb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/database/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: packages/railtracks-gateway
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - STDB_INTERNAL_HOST=stdb:3000
    depends_on:
      stdb:
        condition: service_healthy
    profiles: ["core", "full"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Workers (full profile only) ────────────────────────────────────
  worker-audio-extract:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
      args:
        WORKER_NAME: audio-extract
        NEEDS_FFMPEG: "true"
    env_file: .env
    environment:
      WORKER_NAME: audio-extract
      STDB_INTERNAL_HOST: stdb:3000
    depends_on:
      stdb:
        condition: service_healthy
    profiles: ["workers", "full"]

  worker-video-sample:
